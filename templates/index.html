<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        .buttons {
            margin-top: 15px;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .run-btn {
            background: #16a34a;
            color: white;
        }

        .run-btn:hover {
            background: #15803d;
        }

        .stop-btn {
            background: #dc2626;
            color: white;
        }

        .stop-btn:hover {
            background: #b91c1c;
        }

        #output {
            margin-top: 40px;
        }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
            margin-top: 10px;
        }

        .final-card {
            background: #065f46;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
        }

        p {
            line-height: 1.5;
        }
    </style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />

<div class="buttons">
    <button class="run-btn" onclick="runStream()">⚡ Run Agent</button>
    <button class="stop-btn" onclick="stopAgent()">🛑 Stop</button>
</div>

<div id="output"></div>

<script>
let es = null;

function clean(text) {
    if (!text) return "";

    return text
        .replace(/\\n/g, "<br>")
        .replace(/\*\*/g, "")
        .replace(/###/g, "")
        .replace(/Generated content:/gi, "");
}


function runStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    output.innerHTML = "⚡ Running agent...";

    // Close existing stream if any
    if (es) es.close();

    es = new EventSource(`/stream?goal=${encodeURIComponent(goal)}`);

    let current = null;

    es.addEventListener("start", e => {
        output.innerHTML = `<p>🧠 Starting: ${clean(e.data)}</p>`;
    });

    es.addEventListener("step", e => {
        current = document.createElement("div");
        current.className = "step-card";
        current.innerHTML = `<h3>Step ${e.data}</h3>`;
        output.appendChild(current);
    });

    es.addEventListener("plan", e => {
        current.innerHTML += `
            <div class="label">Plan</div>
            <p>${clean(e.data)}</p>
        `;
    });

    es.addEventListener("result", e => {
        current.innerHTML += `
            <div class="label">Result</div>
            <p>${clean(e.data)}</p>
        `;
    });

    es.addEventListener("reflection", e => {
        current.innerHTML += `
            <div class="label">Reflection</div>
            <p>${clean(e.data)}</p>
        `;
    });

    es.addEventListener("final", e => {
        const finalBlock = document.createElement("div");
        finalBlock.className = "final-card";

        finalBlock.innerHTML = `
            <h2>🏁 Final Answer</h2>
            <p>${clean(e.data)}</p>
        `;

        output.appendChild(finalBlock);
    });

    es.addEventListener("done", () => {
        output.innerHTML += `<p>✅ Goal completed</p>`;
        es.close();
    });

    es.addEventListener("stopped", () => {
        output.innerHTML += `<p>🛑 Stopped by user</p>`;
        es.close();
    });

    es.onerror = () => {
        output.innerHTML += `<p>❌ Connection ended</p>`;
        es.close();
    };
}


function stopAgent() {
    fetch("/stop", { method: "POST" });

    if (es) {
        es.close();
    }
}
</script>

</body>
</html>
