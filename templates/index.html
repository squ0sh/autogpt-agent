<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        #output {
            margin-top: 40px;
        }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .section {
            margin-top: 15px;
        }

        h2 {
            margin-top: 30px;
        }

        h3 {
            margin-bottom: 10px;
        }

        h4 {
            margin-top: 15px;
            color: #60a5fa;
        }

        ul, ol {
            padding-left: 20px;
            margin-top: 5px;
        }

        li {
            margin-bottom: 6px;
        }

        p {
            margin: 6px 0;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1>🧠 AI Agent Dashboard</h1>

    <input id="goal" placeholder="Enter your goal..." />
    <button onclick="runAgent()">Run Agent</button>

    <div id="output"></div>

    <script>
        function cleanText(text) {
            if (!text) return "";

            // Remove JSON/code blocks
            text = text.replace(/```json[\s\S]*?```/g, "");
            text = text.replace(/Generated content:.*$/gm, "");

            const lines = text.split("\n");

            let html = "";
            let inList = false;
            let listType = null;

            lines.forEach(line => {
                let trimmed = line.trim();

                if (!trimmed) return;

                // Fix duplicate numbering like "1. 1."
                trimmed = trimmed.replace(/^\d+\.\s*\d*\.*\s*/, "");

                // Ordered list
                if (/^\d+\./.test(line.trim())) {
                    if (!inList || listType !== "ol") {
                        if (inList) html += listType === "ul" ? "</ul>" : "</ol>";
                        html += "<ol>";
                        inList = true;
                        listType = "ol";
                    }

                    trimmed = trimmed.replace(/^\d+\.\s*/, "");
                    html += `<li>${trimmed}</li>`;
                }

                // Bullet list
                else if (trimmed.startsWith("-") || trimmed.startsWith("•")) {
                    if (!inList || listType !== "ul") {
                        if (inList) html += listType === "ol" ? "</ol>" : "</ul>";
                        html += "<ul>";
                        inList = true;
                        listType = "ul";
                    }

                    trimmed = trimmed.replace(/^[-•]\s*/, "");
                    html += `<li>${trimmed}</li>`;
                }

                else {
                    if (inList) {
                        html += listType === "ol" ? "</ol>" : "</ul>";
                        inList = false;
                    }

                    // Section headers
                    if (trimmed.startsWith("###")) {
                        html += `<h4>${trimmed.replace("###", "").trim()}</h4>`;
                    }

                    // Bold sections (**Title**)
                    else if (trimmed.match(/^\*\*(.*?)\*\*/)) {
                        html += `<p><strong>${trimmed.replace(/\*\*/g, "")}</strong></p>`;
                    }

                    else {
                        html += `<p>${trimmed}</p>`;
                    }
                }
            });

            if (inList) {
                html += listType === "ol" ? "</ol>" : "</ul>";
            }

            return html;
        }

        async function runAgent() {
            const goal = document.getElementById("goal").value;
            const outputDiv = document.getElementById("output");

            outputDiv.innerHTML = "⏳ Running agent...";

            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ goal })
            });

            const data = await res.json();

            let html = `
                <h2>🎯 Goal</h2>
                <p>${data.goal}</p>
            `;

            data.steps.forEach(step => {
                html += `
                    <div class="step-card">
                        <h3>Step ${step.step}</h3>

                        <div class="section">
                            <span class="label">Plan</span>
                            ${cleanText(step.plan)}
                        </div>

                        <div class="section">
                            <span class="label">Result</span>
                            ${cleanText(typeof step.result === "string" 
                                ? step.result 
                                : JSON.stringify(step.result, null, 2))}
                        </div>

                        <div class="section">
                            <span class="label">Reflection</span>
                            ${cleanText(step.reflection)}
                        </div>
                    </div>
                `;
            });

            outputDiv.innerHTML = html;
        }
    </script>

</body>
</html>
