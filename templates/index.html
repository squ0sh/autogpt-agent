<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
        }

        button {
            margin-top: 15px;
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            margin-right: 10px;
        }

        .run { background: #4f46e5; color: white; }
        .stream { background: #16a34a; color: white; }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />

<button class="run" onclick="runAgent()">Run Agent</button>
<button class="stream" onclick="runStream()">⚡ Stream Mode</button>

<div id="output"></div>

<script>
function cleanText(text) {
    if (!text) return "";
    return `<p>${text.replace(/\\n/g, "<br>")}</p>`;
}


// ---------------- NORMAL ----------------
async function runAgent() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    output.innerHTML = "⏳ Running...";

    const res = await fetch("/run", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({goal})
    });

    const data = await res.json();

    let html = `<h2>🎯 ${data.goal}</h2>`;

    data.steps.forEach(step => {
        html += `
        <div class="step-card">
            <h3>Step ${step.step}</h3>

            <p class="label">Plan</p>
            ${cleanText(step.plan)}

            <p class="label">Result</p>
            ${cleanText(JSON.stringify(step.result, null, 2))}

            <p class="label">Reflection</p>
            ${cleanText(step.reflection)}
        </div>
        `;
    });

    output.innerHTML = html;
}


// ---------------- STREAM ----------------
function runStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    output.innerHTML = "⚡ Streaming...";

    const es = new EventSource(`/stream?goal=${encodeURIComponent(goal)}`);

    let current = null;

    es.addEventListener("step", e => {
        current = document.createElement("div");
        current.className = "step-card";
        current.innerHTML = `<h3>Step ${e.data}</h3>`;
        output.appendChild(current);
    });

    es.addEventListener("plan", e => {
        current.innerHTML += `<p class="label">Plan</p>${cleanText(e.data)}`;
    });

    es.addEventListener("result", e => {
        current.innerHTML += `<p class="label">Result</p>${cleanText(e.data)}`;
    });

    es.addEventListener("reflection", e => {
        current.innerHTML += `<p class="label">Reflection</p>${cleanText(e.data)}`;
    });

    es.addEventListener("done", e => {
        output.innerHTML += `<p>✅ ${e.data}</p>`;
        es.close();
    });

    es.onerror = () => {
        output.innerHTML += `<p>❌ Stream ended</p>`;
        es.close();
    };
}
</script>

</body>
</html>
