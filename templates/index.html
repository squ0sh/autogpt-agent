<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: #16a34a;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }

        #output {
            margin-top: 40px;
        }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
            margin-top: 10px;
        }

        .final-card {
            background: #065f46;
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
        }

        p {
            line-height: 1.5;
        }
    </style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />
<button onclick="runStream()">⚡ Run Agent</button>

<div id="output"></div>

<script>
function clean(text) {
    if (!text) return "";

    return text
        .replace(/\\n/g, "<br>")
        .replace(/\*\*/g, "")
        .replace(/###\s*/g, "")
        .replace(/Generated content:/gi, "");
}


function runStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    output.innerHTML = "⚡ Running agent...";

    const es = new EventSource(`/stream?goal=${encodeURIComponent(goal)}`);

    let current = null;

    es.addEventListener("start", e => {
        output.innerHTML = `<p>🧠 ${clean(e.data)}</p>`;
    });

    es.addEventListener("step", e => {
        current = document.createElement("div");
        current.className = "step-card";
        current.innerHTML = `<h3>Step ${e.data}</h3>`;
        output.appendChild(current);
    });

    es.addEventListener("plan", e => {
        current.innerHTML += `
            <div class="label">Plan</div>
            <p>${clean(e.data)}</p>
        `;
    });

    es.addEventListener("result", e => {
        current.innerHTML += `
            <div class="label">Result</div>
            <p>${clean(e.data)}</p>
        `;
    });

    es.addEventListener("reflection", e => {
        current.innerHTML += `
            <div class="label">Reflection</div>
            <p>${clean(e.data)}</p>
        `;
    });

    // 🔥 FINAL ANSWER UI
    es.addEventListener("final", e => {
        const finalBlock = document.createElement("div");
        finalBlock.className = "final-card";

        finalBlock.innerHTML = `
            <h2>🏁 Final Answer</h2>
            <p>${clean(e.data)}</p>
        `;

        output.appendChild(finalBlock);
    });

    es.addEventListener("done", e => {
        output.innerHTML += `<p>✅ ${e.data}</p>`;
        es.close();
    });

    es.onerror = () => {
        output.innerHTML += `<p>❌ Stream ended</p>`;
        es.close();
    };
}
</script>

</body>
</html>
