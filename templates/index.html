<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .run {
            background: #4f46e5;
            color: white;
        }

        .stop {
            background: #dc2626;
            color: white;
        }

        #output {
            margin-top: 40px;
        }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
            margin-top: 10px;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 5px;
        }

        p {
            margin: 6px 0;
            line-height: 1.5;
        }
    </style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />

<button class="run" onclick="startStream()">Run Agent</button>
<button class="stop" onclick="stopAgent()">Stop</button>

<div id="output"></div>

<script>
let eventSource;

function startStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    if (eventSource) eventSource.close();

    output.innerHTML = "";

    const url = `/run-stream?goal=${encodeURIComponent(goal)}`;
    eventSource = new EventSource(url);

    let currentStepDiv = null;

    // START
    eventSource.addEventListener("start", e => {
        output.innerHTML += `<p>🎯 ${e.data}</p>`;
    });

    // STEP
    eventSource.addEventListener("step", e => {
        currentStepDiv = document.createElement("div");
        currentStepDiv.className = "step-card";
        currentStepDiv.innerHTML = `<h3>Step ${e.data}</h3>`;
        output.appendChild(currentStepDiv);
    });

    // STATUS
    eventSource.addEventListener("status", e => {
        if (currentStepDiv) {
            currentStepDiv.innerHTML += `<p>⏳ ${e.data}</p>`;
        }
    });

    // PLAN
    eventSource.addEventListener("plan", e => {
        currentStepDiv.innerHTML += `
            <p class="label">📋 Plan</p>
            ${formatText(e.data)}
        `;
    });

    // RESULT
    eventSource.addEventListener("result", e => {
        currentStepDiv.innerHTML += `
            <p class="label">⚙️ Result</p>
            ${formatText(e.data)}
        `;
    });

    // REFLECTION
    eventSource.addEventListener("reflection", e => {
        currentStepDiv.innerHTML += `
            <p class="label">🧠 Reflection</p>
            ${formatText(e.data)}
        `;
    });

    // DONE
    eventSource.addEventListener("done", e => {
        output.innerHTML += `<p>✅ ${e.data}</p>`;
        eventSource.close();
    });

    // STOP
    eventSource.addEventListener("stop", e => {
        output.innerHTML += `<p>🛑 ${e.data}</p>`;
        eventSource.close();
    });

    // ERROR
    eventSource.addEventListener("error", e => {
        output.innerHTML += `<p>❌ ${e.data}</p>`;
        eventSource.close();
    });
}


// 🔥 Format GPT output nicely
function formatText(text) {
    if (!text) return "";

    // Bullet list detection
    if (text.includes("-")) {
        return "<ul>" + text
            .split("\n")
            .filter(line => line.trim())
            .map(line => `<li>${line.replace(/^[-•]\s*/, "")}</li>`)
            .join("") + "</ul>";
    }

    // Line breaks
    return `<p>${text.replace(/\n/g, "<br>")}</p>`;
}


function stopAgent() {
    fetch("/stop", { method: "POST" });

    if (eventSource) eventSource.close();

    document.getElementById("output").innerHTML += `<p>🛑 Stopped.</p>`;
}
</script>

</body>
</html>
