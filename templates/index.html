<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #4338ca;
        }

        #output {
            margin-top: 40px;
        }

        .step-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .label {
            color: #60a5fa;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .section {
            margin-top: 15px;
        }

        h2 {
            margin-top: 30px;
        }

        h3 {
            margin-bottom: 10px;
        }

        h4 {
            margin-top: 15px;
            color: #60a5fa;
        }

        ul {
            padding-left: 20px;
            margin-top: 5px;
        }

        li {
            margin-bottom: 6px;
        }

        p {
            margin: 6px 0;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <h1>🧠 AI Agent Dashboard</h1>

    <input id="goal" placeholder="Enter your goal..." />
    <button onclick="runAgent()">Run Agent</button>

    <div id="output"></div>

    <script>
        function parseTextToHTML(text) {
            if (!text) return "";

            // Convert markdown-style headers
            text = text.replace(/###\s*(.*)/g, "<h4>$1</h4>");

            // Split into lines
            const lines = text.split("\n");

            let html = "";
            let inList = false;

            lines.forEach(line => {
                const trimmed = line.trim();

                // Bullet points
                if (trimmed.startsWith("-")) {
                    if (!inList) {
                        html += "<ul>";
                        inList = true;
                    }
                    html += `<li>${trimmed.replace("-", "").trim()}</li>`;
                } else {
                    if (inList) {
                        html += "</ul>";
                        inList = false;
                    }

                    if (trimmed !== "") {
                        html += `<p>${trimmed}</p>`;
                    }
                }
            });

            if (inList) html += "</ul>";

            return html;
        }

        async function runAgent() {
            const goal = document.getElementById("goal").value;
            const outputDiv = document.getElementById("output");

            outputDiv.innerHTML = "⏳ Running agent...";

            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ goal })
            });

            const data = await res.json();

            let html = `
                <h2>🎯 Goal</h2>
                <p>${data.goal}</p>
            `;

            data.steps.forEach(step => {
                html += `
                    <div class="step-card">
                        <h3>Step ${step.step}</h3>

                        <div class="section">
                            <span class="label">Plan</span>
                            ${parseTextToHTML(step.plan)}
                        </div>

                        <div class="section">
                            <span class="label">Result</span>
                            ${parseTextToHTML(step.result)}
                        </div>

                        <div class="section">
                            <span class="label">Reflection</span>
                            ${parseTextToHTML(step.reflection)}
                        </div>
                    </div>
                `;
            });

            outputDiv.innerHTML = html;
        }
    </script>

</body>
</html>
