<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .run { background: #4f46e5; color: white; }
        .stop { background: #dc2626; color: white; }

        #output {
            margin-top: 30px;
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            white-space: pre-wrap;
            height: 450px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />

<button class="run" onclick="startStream()">Run Agent</button>
<button class="stop" onclick="stopAgent()">Stop</button>

<div id="output"></div>

<script>
let eventSource;

function startStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    if (eventSource) eventSource.close();

    output.innerHTML = "⏳ Starting...\n";

    const url = `/run-stream?goal=${encodeURIComponent(goal)}`;
    eventSource = new EventSource(url);

    eventSource.onmessage = function(event) {
        output.innerHTML += event.data;
        output.scrollTop = output.scrollHeight;
    };

    eventSource.onerror = function() {
        eventSource.close();
    };
}

function stopAgent() {
    fetch("/stop", { method: "POST" });

    if (eventSource) eventSource.close();

    document.getElementById("output").innerHTML += "\n🛑 Stopped.\n";
}
</script>

</body>
</html>
