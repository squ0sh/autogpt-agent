<!DOCTYPE html>
<html>
<head>
    <title>AI Agent Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        input {
            width: 60%;
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
        }

        button:hover {
            background: #4338ca;
        }

        #output {
            margin-top: 40px;
            text-align: left;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .step-card {
            background: #1f2937;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .label {
            font-weight: bold;
            color: #93c5fd;
        }
    </style>
</head>
<body>

    <h1>🧠 AI Agent Dashboard</h1>

    <input id="goal" placeholder="Enter your goal..." />
    <br>
    <button onclick="runAgent()">Run Agent</button>

    <div id="output">Output will appear here...</div>

    <script>
        async function runAgent() {
            const goal = document.getElementById("goal").value;
            const outputDiv = document.getElementById("output");

            outputDiv.innerHTML = "⏳ Running agent...";

            const res = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ goal })
            });

            const data = await res.json();

            let html = `
                <h2>🎯 Goal</h2>
                <p>${data.goal}</p>
            `;

            data.steps.forEach(step => {
                html += `
                    <div class="step-card">
                        <h3>Step ${step.step}</h3>

                        <p><span class="label">Plan:</span><br>${step.plan}</p>

                        <p><span class="label">Action:</span>
                        ${step.action.action}</p>

                        <p><span class="label">Input:</span><br>
                        ${step.action.input}</p>

                        <p><span class="label">Result:</span><br>
                        ${step.result}</p>

                        <p><span class="label">Reflection:</span><br>
                        ${step.reflection}</p>
                    </div>
                `;
            });

            outputDiv.innerHTML = html;
        }
    </script>

</body>
</html>
