<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Agent Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-right: 10px;
    }

    .run-btn {
      background: #22c55e;
      color: black;
    }

    .stop-btn {
      background: #ef4444;
      color: white;
    }

    .card {
      background: #1e293b;
      padding: 16px;
      border-radius: 12px;
      margin-top: 16px;
    }

    .label {
      color: #60a5fa;
      font-weight: bold;
      margin-top: 10px;
    }

    .final {
      background: #065f46;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    .download {
      margin-top: 15px;
      padding: 12px;
      background: #22c55e;
      color: black;
      border-radius: 8px;
      text-align: center;
      font-weight: bold;
    }

    .download a {
      color: black;
      text-decoration: none;
    }

    /* ✅ FIX: Proper wrapping */
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-wrap: break-word;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🧠 AI Agent Dashboard</h1>

    <input id="goal" placeholder="Enter your goal..." />

    <button class="run-btn" onclick="runAgent()">⚡ Run Agent</button>
    <button class="stop-btn" onclick="stopAgent()">🛑 Stop</button>

    <div id="output"></div>
  </div>

  <script>
    let eventSource;

    function runAgent() {
      const goal = document.getElementById("goal").value;
      const output = document.getElementById("output");

      output.innerHTML = "";
      let currentStepDiv = null;

      eventSource = new EventSource(`/run?goal=${encodeURIComponent(goal)}`);

      function createStep(stepNum) {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `<h3>Step ${stepNum}</h3>`;
        output.appendChild(div);
        return div;
      }

      eventSource.addEventListener("start", (e) => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `🧠 Starting: ${e.data}`;
        output.appendChild(div);
      });

      eventSource.addEventListener("step", (e) => {
        currentStepDiv = createStep(e.data);
      });

      eventSource.addEventListener("plan", (e) => {
        const el = document.createElement("div");
        el.innerHTML = `<div class="label">Plan</div><pre>${e.data}</pre>`;
        currentStepDiv.appendChild(el);
      });

      eventSource.addEventListener("action", (e) => {
        const el = document.createElement("div");
        el.innerHTML = `<div class="label">Action</div><pre>${e.data}</pre>`;
        currentStepDiv.appendChild(el);
      });

      eventSource.addEventListener("result", (e) => {
        const el = document.createElement("div");
        el.innerHTML = `<div class="label">Result</div><pre>${e.data}</pre>`;
        currentStepDiv.appendChild(el);
      });

      eventSource.addEventListener("reflection", (e) => {
        const el = document.createElement("div");
        el.innerHTML = `<div class="label">Reflection</div><pre>${e.data}</pre>`;
        currentStepDiv.appendChild(el);
      });

      // ✅ FINAL OUTPUT
      eventSource.addEventListener("final", (e) => {
        const div = document.createElement("div");
        div.className = "final";
        div.innerHTML = `
          🏁 <strong>Final Answer</strong><br><br>
          <pre>${e.data}</pre>
        `;
        output.appendChild(div);
      });

      // ✅ DOWNLOAD BUTTON (FIXED)
      eventSource.addEventListener("file", (e) => {
        const div = document.createElement("div");
        div.className = "download";

        div.innerHTML = `
          📥 <a href="${e.data}" target="_blank">
            Download Final Output
          </a>
        `;

        output.appendChild(div);
      });

      eventSource.addEventListener("done", () => {
        eventSource.close();
      });

      eventSource.onerror = () => {
        console.error("Stream error");
        eventSource.close();
      };
    }

    function stopAgent() {
      fetch("/stop");
      if (eventSource) eventSource.close();
    }
  </script>
</body>
</html>
