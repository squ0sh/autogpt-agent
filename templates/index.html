<!DOCTYPE html>
<html>
<head>
<title>AI Agent Dashboard</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to bottom, #0f172a, #1e293b);
    color: white;
    padding: 40px;
    max-width: 900px;
    margin: auto;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    margin-top: 20px;
}

button {
    padding: 12px 20px;
    border-radius: 8px;
    border: none;
    margin-right: 10px;
    cursor: pointer;
}

.run-btn { background: #16a34a; }
.stop-btn { background: #dc2626; }

.step-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

.label {
    color: #60a5fa;
    font-weight: bold;
}

.final-card {
    background: #065f46;
    padding: 25px;
    border-radius: 12px;
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>🧠 AI Agent Dashboard</h1>

<input id="goal" placeholder="Enter your goal..." />

<br><br>

<button class="run-btn" onclick="runStream()">⚡ Run Agent</button>
<button class="stop-btn" onclick="stopAgent()">🛑 Stop</button>

<div id="output"></div>

<script>
let es;

function clean(text) {
    return text.replace(/\\n/g, "<br>");
}

function runStream() {
    const goal = document.getElementById("goal").value;
    const output = document.getElementById("output");

    output.innerHTML = "";

    if (es) es.close();

    es = new EventSource(`/stream?goal=${encodeURIComponent(goal)}`);

    let current;

    es.addEventListener("start", e => {
        output.innerHTML += `<p>🧠 Starting: ${clean(e.data)}</p>`;
    });

    es.addEventListener("step", e => {
        current = document.createElement("div");
        current.className = "step-card";
        current.innerHTML = `<h3>Step ${e.data}</h3>`;
        output.appendChild(current);
    });

    es.addEventListener("plan", e => {
        current.innerHTML += `<div class="label">Plan</div><p>${clean(e.data)}</p>`;
    });

    es.addEventListener("result", e => {
        current.innerHTML += `<div class="label">Result</div><p>${clean(e.data)}</p>`;
    });

    es.addEventListener("reflection", e => {
        current.innerHTML += `<div class="label">Reflection</div><p>${clean(e.data)}</p>`;
    });

    es.addEventListener("final", e => {
        const div = document.createElement("div");
        div.className = "final-card";
        div.innerHTML = `<h2>🏁 Final Answer</h2><p>${clean(e.data)}</p>`;
        output.appendChild(div);
    });

    es.addEventListener("file", e => {
        const link = document.createElement("a");
        link.href = e.data;
        link.download = "";
        link.innerText = "📥 Download Final Output";

        link.style.display = "block";
        link.style.marginTop = "15px";
        link.style.padding = "12px";
        link.style.background = "#22c55e";
        link.style.color = "black";
        link.style.borderRadius = "8px";
        link.style.textAlign = "center";
        link.style.fontWeight = "bold";

        output.appendChild(link);
    });

    es.addEventListener("done", () => {
        output.innerHTML += "<p>✅ Goal completed</p>";
        es.close();
    });
}

function stopAgent() {
    fetch("/stop", { method: "POST" });
    if (es) es.close();
}
</script>

</body>
</html>
